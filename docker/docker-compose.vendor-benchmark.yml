version: '3.8'

services:
  vendor-benchmark:
    build:
      context: .
      dockerfile: docker/Dockerfile.vendor_benchmark
    image: tvm-vendor-benchmark
    container_name: tvm-vendor-benchmark
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - .:/workspace
      - ./benchmark_results:/workspace/results
    working_dir: /workspace/apps/benchmark/vendor_comparison
    stdin_open: true
    tty: true
    command: bash
    
  # CPU-only version for systems without GPU
  vendor-benchmark-cpu:
    build:
      context: .
      dockerfile: docker/Dockerfile.vendor_benchmark
    image: tvm-vendor-benchmark
    container_name: tvm-vendor-benchmark-cpu
    volumes:
      - .:/workspace
      - ./benchmark_results:/workspace/results
    working_dir: /workspace/apps/benchmark/vendor_comparison
    stdin_open: true
    tty: true
    command: bash